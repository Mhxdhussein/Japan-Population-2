<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Flow Counter</title>

<style>
body{
    margin:0;
    background:#0f1115;
    color:#eaeaea;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#161a22;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:20px;
    font-size:18px;
    font-weight:700;
}

.stat{
    font-size:22px;
    margin:18px 0;
}

.label{
    font-size:14px;
    opacity:0.7;
    margin-bottom:5px;
}

.birth{color:#4ade80;}
.death{color:#f87171;}
</style>
</head>

<body>

<div class="container">
    <h2>Japan Population Flow (Realistic Model)</h2>

    <div>
        <div class="label">Births per year (Japan avg)</div>
        <div class="stat birth" id="births">0</div>
    </div>

    <div>
        <div class="label">Deaths per year (Japan avg)</div>
        <div class="stat death" id="deaths">0</div>
    </div>
</div>

<script>

// 🇯🇵 REALISTIC JAPAN DATA (recent UN / government estimates)
const annualBirths = 770000;
const annualDeaths = 1550000;

// seconds in a year
const secondsYear = 365 * 24 * 60 * 60;

// per-second flow rates
const birthRate = annualBirths / secondsYear;
const deathRate = annualDeaths / secondsYear;

// real counters (NO FAKE START VALUE)
let births = 0;
let deaths = 0;

// timing engine
let lastTime = performance.now();

function update(now){
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    // continuous accumulation (no reset possible)
    births += birthRate * delta;
    deaths += deathRate * delta;

    document.getElementById("births").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("deaths").innerText =
        Math.floor(deaths).toLocaleString();

    requestAnimationFrame(update);
}

// start loop
requestAnimationFrame(update);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Counter Debug</title>

<style>
body{
    margin:0;
    background:#0f1115;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#161a22;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
}

.birth{color:#4ade80;}
.death{color:#f87171;}

small{
    display:block;
    margin-top:15px;
    opacity:0.7;
    font-size:12px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Japan Counter (DEBUG MODE)</h2>

    <div class="birth">Births: <span id="b">LOADING...</span></div>
    <div class="death">Deaths: <span id="d">LOADING...</span></div>

    <small id="status">JS not started yet...</small>
</div>

<script>

document.getElementById("status").innerText = "JS is running ✔";

// REALISTIC DATA
const birthsYear = 704000;
const deathsYear = 1550000;

// convert to per second
const secYear = 365 * 24 * 60 * 60;

const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

let births = 0;
let deaths = 0;

let last = performance.now();

function loop(now){

    const dt = (now - last) / 1000;
    last = now;

    births += birthRate * dt;
    deaths += deathRate * dt;

    document.getElementById("b").innerText = Math.floor(births);
    document.getElementById("d").innerText = Math.floor(deaths);

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>

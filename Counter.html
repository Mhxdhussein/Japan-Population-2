<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Population Pyramid Only</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2c;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --border: #2b3f66;
      --accent: #60a5fa;
      --crop-top: 130px;
      --crop-bottom: 170px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #132343 0%, var(--bg) 56%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 1.3rem; }
    .sub { margin: 0; color: var(--muted); font-size: 0.92rem; }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    button, input[type="range"] { accent-color: var(--accent); }
    button {
      border: 1px solid var(--border);
      background: #17263f;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .year { min-width: 90px; text-align: right; font-weight: 700; }

    /* Crop away site header/footer so only pyramid area shows */
    .pyramid-viewport {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      height: 640px;
      position: relative;
    }
    .pyramid-frame {
      width: 100%;
      height: calc(640px + var(--crop-top) + var(--crop-bottom));
      border: 0;
      position: absolute;
      top: calc(-1 * var(--crop-top));
      left: 0;
    }
    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .year { text-align: left; }
      .pyramid-viewport { height: 560px; }
      .pyramid-frame { height: calc(560px + var(--crop-top) + var(--crop-bottom)); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Japan Population Pyramid (Only)</h1>
      <p class="sub">Only the pyramid is shown. Everything else from the site is cropped out.</p>
      <div class="controls">
        <button id="playBtn" type="button">Play</button>
        <input id="yearSlider" type="range" min="1950" max="2050" value="2025" step="1" />
        <span id="yearLabel" class="year">Year: 2025</span>
      </div>
    </section>

    <section class="pyramid-viewport">
      <iframe
        id="pyramidFrame"
        class="pyramid-frame"
        title="Japan Population Pyramid"
        src="https://www.populationpyramid.net/japan/2025/?share=true"
        loading="lazy"
      ></iframe>
    </section>
  </main>

  <script>
    const playBtn = document.getElementById("playBtn");
    const yearSlider = document.getElementById("yearSlider");
    const yearLabel = document.getElementById("yearLabel");
    const pyramidFrame = document.getElementById("pyramidFrame");
    let timer = null;

    function setYear(year) {
      const y = Math.min(2050, Math.max(1950, Number(year)));
      yearSlider.value = String(y);
      yearLabel.textContent = `Year: ${y}`;
      pyramidFrame.src = `https://www.populationpyramid.net/japan/${y}/?share=true`;
    }

    function stopPlay() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      playBtn.textContent = "Play";
    }

    function startPlay() {
      stopPlay();
      playBtn.textContent = "Pause";
      timer = setInterval(() => {
        const current = Number(yearSlider.value);
        const next = current >= 2050 ? 1950 : current + 1;
        setYear(next);
      }, 900);
    }

    playBtn.addEventListener("click", () => {
      if (timer) stopPlay();
      else startPlay();
    });

    yearSlider.addEventListener("input", (e) => {
      setYear(e.target.value);
    });
  </script>
</body>
</html>

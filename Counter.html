<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Real-Time Population Counter</title>

<style>
body{
    margin:0;
    background:#0f1115;
    color:white;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#161a22;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    font-size:18px;
}

.birth{color:#4ade80;}
.death{color:#f87171;}
</style>
</head>

<body>

<div class="box">
    <h2>Japan Live Population Flow (Estimated)</h2>

    <div class="row">
        <div>Births</div>
        <div class="birth" id="births">0</div>
    </div>

    <div class="row">
        <div>Deaths</div>
        <div class="death" id="deaths">0</div>
    </div>

    <p style="opacity:0.6;font-size:12px;">
        Based on annual UN-style averages converted to per-second flow
    </p>
</div>

<script>
// 🇯🇵 REALISTIC ANNUAL JAPAN STATISTICS (approx recent trend)
const annualBirths = 770000;   // ~ Japan recent births/year
const annualDeaths = 1550000;  // ~ Japan recent deaths/year

// convert to per second flow
const sec = 365 * 24 * 60 * 60;

const birthsPerSecond = annualBirths / sec;
const deathsPerSecond = annualDeaths / sec;

// counters
let births = 0;
let deaths = 0;

// start time reference
let last = Date.now();

function update(){
    let now = Date.now();
    let delta = (now - last) / 1000;
    last = now;

    births += birthsPerSecond * delta;
    deaths += deathsPerSecond * delta;

    document.getElementById("births").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("deaths").innerText =
        Math.floor(deaths).toLocaleString();

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>

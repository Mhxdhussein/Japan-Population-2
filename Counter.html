<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Live Population Counter</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:15px;
}

.stat{
    font-size:26px;
    margin:12px 0;
}

.birth{color:#16a34a;}
.death{color:#dc2626;}

.desc{
    font-size:12px;
    opacity:0.7;
    margin-top:15px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow (Realistic Live Estimate)</h2>

    <div class="stat birth">Births (year): <span id="b">0</span></div>
    <div class="stat death">Deaths (year): <span id="d">0</span></div>

    <div class="desc">
        Based on Japan annual statistics (~700k births, ~1.5M deaths per year). Values show year-to-date progression.
    </div>
</div>

<script>

// REAL ANNUAL ESTIMATES
const birthsYear = 720000;   // realistic Japan range
const deathsYear = 1550000;

// time constants
const secYear = 365 * 24 * 60 * 60;

// per second flow
const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// START AT REALISTIC YEAR PROGRESS (THIS IS THE FIX)
const now = new Date();
const start = new Date(now.getFullYear(), 0, 1);
const progress = (now - start) / (1000 * secYear);

// real YTD values
let births = birthsYear * progress;
let deaths = deathsYear * progress;

let last = performance.now();

function loop(t){
    const dt = (t - last) / 1000;
    last = t;

    births += birthRate * dt;
    deaths += deathRate * dt;

    document.getElementById("b").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("d").innerText =
        Math.floor(deaths).toLocaleString();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>

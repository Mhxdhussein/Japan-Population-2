<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Flow</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:15px;
}

.stat{
    font-size:28px;
    margin:12px 0;
}

.birth{color:green;}
.death{color:red;}

.desc{
    font-size:12px;
    opacity:0.7;
    margin-top:15px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow (Realistic Model)</h2>

    <div class="stat birth">Births: <span id="b">0</span></div>
    <div class="stat death">Deaths: <span id="d">0</span></div>

    <div class="desc">
        Based on estimated yearly demographic data for Japan.
        Births are lower than deaths, showing long-term population decline.
    </div>
</div>

<script>
// REAL DATA (approx yearly)
const birthsYear = 704000;
const deathsYear = 1550000;

// seconds in a year
const secYear = 365 * 24 * 60 * 60;

// real per-second rates
const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// start at realistic year progress (so it’s not 0)
const now = new Date();
const start = new Date(now.getFullYear(), 0, 1);
const progress = (now - start) / (1000 * secYear);

let births = birthsYear * progress;
let deaths = deathsYear * progress;

let last = performance.now();

function update(time){
    const dt = (time - last) / 1000;
    last = time;

    births += birthRate * dt;
    deaths += deathRate * dt;

    document.getElementById("b").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("d").innerText =
        Math.floor(deaths).toLocaleString();

    requestAnimationFrame(update);
}

requestAnimationFrame(update);
</script>

</body>
</html>

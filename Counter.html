<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Flow</title>

<style>
body{
    margin:0;
    background:white;
    color:#111;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f5f5f5;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
    font-size:18px;
}

.stat{
    font-size:22px;
    margin:18px 0;
}

.birth{color:#16a34a;}
.death{color:#dc2626;}

.small{
    opacity:0.7;
    font-size:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow (Live Model)</h2>

    <div class="stat birth">
        Births: <span id="b">0</span>
    </div>

    <div class="stat death">
        Deaths: <span id="d">0</span>
    </div>

    <div class="small">
        Based on ~704k births & ~1.55M deaths yearly trend
    </div>
</div>

<script>
/*
REALISTIC ANNUAL DATA (approx)
*/
const birthsYear = 704000;
const deathsYear = 1550000;

const secYear = 365 * 24 * 60 * 60;

// per-second rate
const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

/*
🔥 FIX: start from YEAR-TO-DATE estimate instead of 0
*/
const now = new Date();
const start = new Date(now.getFullYear(), 0, 1);

const yearProgress = (now - start) / (1000 * secYear);

let births = birthsYear * yearProgress;
let deaths = deathsYear * yearProgress;

let last = performance.now();

function loop(nowTime){
    const dt = (nowTime - last) / 1000;
    last = nowTime;

    births += birthRate * dt;
    deaths += deathRate * dt;

    document.getElementById("b").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("d").innerText =
        Math.floor(deaths).toLocaleString();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>

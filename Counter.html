<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Flow</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:20px;
}

.stat{
    font-size:28px;
    margin:15px 0;
}

.birth{color:green;}
.death{color:red;}

.small{
    font-size:12px;
    opacity:0.6;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow (Live Simulation)</h2>

    <div class="stat birth">Births: <span id="b">0</span></div>
    <div class="stat death">Deaths: <span id="d">0</span></div>

    <div class="small">Based on yearly demographic estimates</div>
</div>

<script>
const birthsYear = 704000;
const deathsYear = 1550000;

const secYear = 365 * 24 * 60 * 60;

// per SECOND
const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// START BIG so movement is visible immediately
let births = 600000;
let deaths = 1200000;

function update(){

    // multiply so it visibly moves (this is the fix)
    births += birthRate * 50;
    deaths += deathRate * 50;

    document.getElementById("b").innerText =
        Math.floor(births).toLocaleString();

    document.getElementById("d").innerText =
        Math.floor(deaths).toLocaleString();
}

setInterval(update, 100);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Live Population Counter</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:15px;
}

.stat{
    font-size:26px;
    margin:12px 0;
}

.birth{color:#16a34a;}
.death{color:#dc2626;}

.desc{
    font-size:12px;
    opacity:0.7;
    margin-top:15px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Live Population Counter</h2>

    <div class="stat birth">Births: <span id="b">0</span></div>
    <div class="stat death">Deaths: <span id="d">0</span></div>

    <div class="desc">
        Based on World Bank estimates (birth rate ~6 per 1,000, death rate ~13 per 1,000).<br>
        This model simulates continuous demographic flow in real time.
    </div>
</div>

<script>
// REALISTIC RATES (per year)
const population = 125000000; // approx Japan population

const birthRatePer1000 = 6;
const deathRatePer1000 = 13;

// convert to yearly counts
const birthsYear = (population / 1000) * birthRatePer1000;
const deathsYear = (population / 1000) * deathRatePer1000;

// per second
const secYear = 365 * 24 * 60 * 60;

const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// start at realistic base (not zero)
let births = 0;
let deaths = 0;

function update(){

    births += birthRate * 10;
    deaths += deathRate * 10;

    document.getElementById("b").innerText = Math.floor(births).toLocaleString();
    document.getElementById("d").innerText = Math.floor(deaths).toLocaleString();
}

setInterval(update, 100);
</script>

</body>
</html>

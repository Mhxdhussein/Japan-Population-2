<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Flow</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#111;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:20px;
}

.stat{
    font-size:24px;
    margin:15px 0;
}

.birth{color:#16a34a;}
.death{color:#dc2626;}

.small{
    font-size:12px;
    opacity:0.6;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow (Live Model)</h2>

    <div class="stat birth">
        Births: <span id="b">0</span>
    </div>

    <div class="stat death">
        Deaths: <span id="d">0</span>
    </div>

    <div class="small">
        Estimated yearly trend model
    </div>
</div>

<script>
// REAL DATA (approx yearly)
const birthsYear = 704000;
const deathsYear = 1550000;

// seconds in a year
const secYear = 365 * 24 * 60 * 60;

// per second rates
const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// start at realistic visible values (not 0)
let births = 500000;
let deaths = 1100000;

let last = performance.now();

function loop(time){
    const dt = (time - last) / 1000;
    last = time;

    births += birthRate * dt;
    deaths += deathRate * dt;

    document.getElementById("b").innerText = Math.floor(births).toLocaleString();
    document.getElementById("d").innerText = Math.floor(deaths).toLocaleString();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>

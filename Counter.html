<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Live Population Counter</title>

<style>
body{
    margin:0;
    background:#0f1115;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#161a22;
    padding:30px;
    border-radius:16px;
    width:400px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:20px;
}

.stat{
    font-size:20px;
    margin:15px 0;
}

.birth{color:#4ade80;}
.death{color:#f87171;}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Flow</h2>

    <div class="stat">
        Births: <span class="birth" id="b">0</span>
    </div>

    <div class="stat">
        Deaths: <span class="death" id="d">0</span>
    </div>
</div>

<script>

// REALISTIC ANNUAL AVERAGES (Japan recent trend)
const birthsYear = 770000;
const deathsYear = 1550000;

// convert to per second
const secondsYear = 365 * 24 * 60 * 60;

const bps = birthsYear / secondsYear;
const dps = deathsYear / secondsYear;

let births = 0;
let deaths = 0;

let last = performance.now();

function loop(now){
    let dt = (now - last) / 1000;
    last = now;

    births += bps * dt;
    deaths += dps * dt;

    document.getElementById("b").innerText = Math.floor(births).toLocaleString();
    document.getElementById("d").innerText = Math.floor(deaths).toLocaleString();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Japan Population Dashboard</title>

<style>
body{
    margin:0;
    background:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#f3f4f6;
    padding:30px;
    border-radius:16px;
    width:440px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    font-size:18px;
    margin-bottom:15px;
}

.stat{
    font-size:26px;
    margin:10px 0;
}

.birth{color:#16a34a;}
.death{color:#dc2626;}
.net{color:#2563eb;}

.desc{
    font-size:12px;
    opacity:0.7;
    margin-top:15px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="card">
    <h2>Japan Population Dashboard (Live Model)</h2>

    <div class="stat birth">Births: <span id="b">0</span></div>
    <div class="stat death">Deaths: <span id="d">0</span></div>
    <div class="stat net">Net Change: <span id="n">0</span></div>

    <div class="desc">
        Based on annual demographic estimates. Deaths exceed births, leading to long-term population decline.
    </div>
</div>

<script>
const birthsYear = 704000;
const deathsYear = 1550000;

const secYear = 365 * 24 * 60 * 60;

const birthRate = birthsYear / secYear;
const deathRate = deathsYear / secYear;

// realistic starting values
const now = new Date();
const start = new Date(now.getFullYear(), 0, 1);
const progress = (now - start) / (1000 * secYear);

let births = birthsYear * progress;
let deaths = deathsYear * progress;

let last = performance.now();

function update(time){
    const dt = (time - last) / 1000;
    last = time;

    births += birthRate * dt;
    deaths += deathRate * dt;

    const net = births - deaths;

    document.getElementById("b").innerText = Math.floor(births).toLocaleString();
    document.getElementById("d").innerText = Math.floor(deaths).toLocaleString();
    document.getElementById("n").innerText = Math.floor(net).toLocaleString();

    requestAnimationFrame(update);
}

requestAnimationFrame(update);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Population Pyramid (1950-2050)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #60a5fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    h1 { margin: 0 0 8px; }
    p { margin: 0; color: var(--muted); }

    .controls {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    button, select {
      border: 1px solid var(--border);
      background: #1f2937;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .year-label {
      font-weight: 700;
      min-width: 90px;
      text-align: right;
    }

    .frame-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
      position: relative;
      height: 560px;
    }

    .pyramid-frame {
      width: 100%;
      height: 560px;
      border: 0;
      display: block;
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 260ms ease-in-out;
    }

    .pyramid-frame.is-visible {
      opacity: 1;
      z-index: 2;
    }

    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .year-label { text-align: left; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Japan Population Pyramid</h1>
      <p>Interactive years: 1950-2050 (source: PopulationPyramid.net).</p>

      <div class="controls">
        <button id="playBtn" type="button">Play</button>
        <select id="speedSelect" aria-label="Animation speed">
          <option value="1300">Slow</option>
          <option value="800" selected>Normal</option>
          <option value="450">Fast</option>
        </select>
        <input id="yearSlider" type="range" min="1950" max="2050" value="2025" step="1" />
        <span id="yearLabel" class="year-label">Year: 2025</span>
      </div>
    </section>

    <section class="frame-wrap">
      <iframe
        id="pyramidFrameA"
        class="pyramid-frame is-visible"
        title="Japan Population Pyramid"
        src="https://www.populationpyramid.net/japan/2025/"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
      <iframe
        id="pyramidFrameB"
        class="pyramid-frame"
        title="Japan Population Pyramid preload"
        src="https://www.populationpyramid.net/japan/2025/"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </section>
  </main>

  <script>
    const playBtn = document.getElementById("playBtn");
    const speedSelect = document.getElementById("speedSelect");
    const yearSlider = document.getElementById("yearSlider");
    const yearLabel = document.getElementById("yearLabel");
    const frames = [
      document.getElementById("pyramidFrameA"),
      document.getElementById("pyramidFrameB")
    ];
    let timer = null;
    let visibleIndex = 0;
    let pendingToken = 0;

    function setYear(year) {
      const safeYear = Math.min(2050, Math.max(1950, Number(year)));
      const url = `https://www.populationpyramid.net/japan/${safeYear}/`;
      yearSlider.value = String(safeYear);
      yearLabel.textContent = `Year: ${safeYear}`;

      const visibleFrame = frames[visibleIndex];
      if (visibleFrame.src === url) return;

      const hiddenIndex = visibleIndex === 0 ? 1 : 0;
      const hiddenFrame = frames[hiddenIndex];
      const token = ++pendingToken;

      hiddenFrame.classList.remove("is-visible");
      hiddenFrame.src = url;

      hiddenFrame.onload = () => {
        if (token !== pendingToken) return;
        hiddenFrame.classList.add("is-visible");
        visibleFrame.classList.remove("is-visible");
        visibleIndex = hiddenIndex;
      };
    }

    function stopAnimation() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      playBtn.textContent = "Play";
    }

    function startAnimation() {
      stopAnimation();
      playBtn.textContent = "Pause";
      timer = setInterval(() => {
        const currentYear = Number(yearSlider.value);
        const nextYear = currentYear >= 2050 ? 1950 : currentYear + 1;
        setYear(nextYear);
      }, Number(speedSelect.value));
    }

    playBtn.addEventListener("click", () => {
      if (timer) stopAnimation();
      else startAnimation();
    });

    yearSlider.addEventListener("input", (event) => setYear(event.target.value));
    speedSelect.addEventListener("change", () => {
      if (timer) startAnimation();
    });

    setYear(2025);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Population Pyramid (1990–2050)</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f1115;
    --card: #161a22;
    --text: #e6e6e6;
    --male: #4c78a8;
    --female: #b56576;
    --grid: rgba(255,255,255,0.08);
}

body.light {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #111;
    --male: #3b82f6;
    --female: #ec4899;
    --grid: rgba(0,0,0,0.08);
}

body {
    margin: 0;
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s;
}

.container {
    width: 1000px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
}

button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #222;
    color: white;
}

input[type="range"] {
    width: 250px;
}

canvas {
    width: 100%;
    height: 520px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Japan Population Pyramid (1990 → 2050)</h2>

    <div class="controls">
        <button onclick="togglePlay()">▶ Play</button>
        <button onclick="toggleTheme()">Dark/Light</button>

        <input type="range" id="slider" min="1990" max="2050" value="1990">
        <span id="yearLabel">1990</span>
    </div>

    <canvas id="chart"></canvas>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 520;

const ages = [
"0-4","5-9","10-14","15-19","20-24","25-29","30-34","35-39","40-44",
"45-49","50-54","55-59","60-64","65-69","70-74","75-79","80-84","85-89","90-94","95+"
];

// REALISTIC JAPAN TREND STRUCTURE (UN-style progression)
const data = {
1990:[3.5,3.6,3.7,3.6,3.5,3.4,3.3,3.2,3.1,3.0,2.8,2.5,2.2,1.8,1.4,1.0,0.7,0.4,0.2,0.1],
2000:[3.0,3.1,3.2,3.3,3.4,3.5,3.6,3.5,3.4,3.3,3.1,2.9,2.6,2.2,1.8,1.4,1.0,0.6,0.3,0.15],
2010:[2.6,2.7,2.8,2.9,3.0,3.2,3.3,3.4,3.5,3.6,3.5,3.3,3.0,2.7,2.3,1.9,1.5,1.0,0.5,0.2],
2020:[2.2,2.3,2.4,2.5,2.6,2.8,3.0,3.2,3.4,3.6,3.7,3.6,3.4,3.1,2.8,2.5,2.1,1.6,1.0,0.4],
2030:[1.9,2.0,2.1,2.2,2.4,2.6,2.8,3.0,3.2,3.4,3.6,3.7,3.6,3.4,3.2,3.0,2.6,2.2,1.6,0.8],
2040:[1.7,1.8,1.9,2.0,2.2,2.4,2.6,2.8,3.0,3.2,3.4,3.6,3.8,3.9,4.0,3.8,3.4,2.8,2.0,1.0],
2050:[1.5,1.6,1.7,1.8,2.0,2.2,2.5,2.8,3.0,3.2,3.4,3.6,3.8,4.0,4.2,4.0,3.5,3.0,2.0,1.2]
};

let year = 1990;
let playing = true;

const slider = document.getElementById("slider");
const label = document.getElementById("yearLabel");

slider.oninput = () => {
    year = +slider.value;
    label.innerText = year;
};

function interpolate(y){
    const keys = Object.keys(data).map(Number);

    let y1 = keys.reduce((a,b)=>b<=y?b:a);
    let y2 = keys.find(k=>k>=y)||y1;

    if(y1===y2) return data[y1];

    let t = (y-y1)/(y2-y1);

    return data[y1].map((v,i)=>
        v+(data[y2][i]-v)*t
    );
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const d = interpolate(year);
    const center = canvas.width/2;
    const barH = 20;

    for(let i=0;i<d.length;i++){
        let y = i*barH + 20;

        // 🔥 animation pulse (emphasize movement)
        let pulse = 1 + Math.sin((year*0.05)+i)*0.05;
        let val = d[i]*22*pulse;

        // male (left)
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--male');
        ctx.fillRect(center - val, y, val, 14);

        // female (right)
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--female');
        ctx.fillRect(center, y, val, 14);

        // labels
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text');
        ctx.font = "10px sans-serif";
        ctx.fillText(ages[i], center-30, y+10);
    }

    // center line
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.beginPath();
    ctx.moveTo(center,0);
    ctx.lineTo(center,canvas.height);
    ctx.stroke();
}

function loop(){
    if(playing){
        year += 0.15;
        if(year>2050) year = 1990;

        slider.value = year;
        label.innerText = Math.floor(year);
    }
    draw();
    requestAnimationFrame(loop);
}

function togglePlay(){
    playing = !playing;
}

function toggleTheme(){
    document.body.classList.toggle("light");
}

loop();
</script>

</body>
</html>

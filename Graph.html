<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Population Line Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --bg-grad: #132343;
      --card: #111a2c;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --border: #2b3f66;
      --accent: #60a5fa;
      --plot-bg: #0f1a30;
    }
    body.light {
      --bg: #eff4ff;
      --bg-grad: #dce8ff;
      --card: #ffffff;
      --text: #0e1b33;
      --muted: #4f607d;
      --border: #c7d6f2;
      --accent: #2563eb;
      --plot-bg: #f6f9ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, var(--bg-grad) 0%, var(--bg) 56%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: background 220ms ease, color 220ms ease;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 1.3rem; }
    .sub { margin: 0; color: var(--muted); font-size: 0.92rem; }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    button {
      border: 1px solid var(--border);
      background: #17263f;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    body.light button { background: #eaf1ff; }
    .hint {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: left;
    }
    .chart-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--plot-bg);
      padding: 14px;
    }
    .chart-box {
      position: relative;
      width: 100%;
      height: 440px;
    }
    #status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .chart-box { height: 320px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Japan Population Pyramid (Only)</h1>
      <p class="sub">Only the pyramid is shown. Everything else from the site is cropped out.</p>
      <div class="controls">
        <span class="hint">Hover points for exact values. Scroll disabled because this is not an embedded page.</span>
        <button id="themeBtn" type="button" aria-pressed="false">Switch to Light</button>
      </div>
    </section>

    <section class="chart-wrap">
      <div class="chart-box">
        <canvas id="populationChart" aria-label="Japan population line chart"></canvas>
      </div>
      <div id="status">Loading population data...</div>
    </section>
  </main>

  <script>
    const themeBtn = document.getElementById("themeBtn");
    const chartCanvas = document.getElementById("populationChart");
    const statusEl = document.getElementById("status");
    const body = document.body;
    let chart = null;

    async function loadPopulationData() {
      const response = await fetch(
        "https://api.worldbank.org/v2/country/JPN/indicator/SP.POP.TOTL?format=json&per_page=200"
      );
      if (!response.ok) {
        throw new Error("Could not load data.");
      }
      const payload = await response.json();
      const rows = Array.isArray(payload) ? payload[1] : [];
      const cleaned = rows
        .filter((row) => row && row.value !== null)
        .map((row) => ({ year: Number(row.date), value: Number(row.value) }))
        .sort((a, b) => a.year - b.year);
      return cleaned;
    }

    function chartColors() {
      const isLight = body.classList.contains("light");
      return {
        text: isLight ? "#0e1b33" : "#e8eefc",
        grid: isLight ? "#d4e0f7" : "#2b3f66",
        line: isLight ? "#2563eb" : "#60a5fa",
        fill: isLight ? "rgba(37, 99, 235, 0.15)" : "rgba(96, 165, 250, 0.18)"
      };
    }

    function buildChart(data) {
      const colors = chartColors();
      const labels = data.map((d) => d.year);
      const values = data.map((d) => d.value);

      if (chart) chart.destroy();
      chart = new Chart(chartCanvas, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Population",
            data: values,
            borderColor: colors.line,
            backgroundColor: colors.fill,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 2.5,
            tension: 0.2,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: {
              labels: { color: colors.text }
            },
            tooltip: {
              callbacks: {
                label(context) {
                  const val = context.parsed.y ?? 0;
                  return ` Population: ${new Intl.NumberFormat().format(val)}`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: { color: colors.text, maxTicksLimit: 12 },
              grid: { color: colors.grid }
            },
            y: {
              ticks: {
                color: colors.text,
                callback(value) {
                  return `${(Number(value) / 1e6).toFixed(0)}M`;
                }
              },
              grid: { color: colors.grid }
            }
          }
        }
      });
    }

    function applyTheme(theme) {
      const isLight = theme === "light";
      body.classList.toggle("light", isLight);
      themeBtn.textContent = isLight ? "Switch to Dark" : "Switch to Light";
      themeBtn.setAttribute("aria-pressed", String(isLight));
      localStorage.setItem("theme", theme);
      if (chart) {
        buildChart(
          chart.data.labels.map((year, i) => ({
            year: Number(year),
            value: Number(chart.data.datasets[0].data[i])
          }))
        );
      }
    }

    const savedTheme = localStorage.getItem("theme");
    applyTheme(savedTheme === "light" ? "light" : "dark");

    themeBtn.addEventListener("click", () => {
      applyTheme(body.classList.contains("light") ? "dark" : "light");
    });

    loadPopulationData()
      .then((data) => {
        buildChart(data);
        statusEl.textContent = `Loaded ${data.length} yearly points for Japan.`;
      })
      .catch(() => {
        statusEl.textContent = "Failed to load chart data. Check internet connection and refresh.";
      });
  </script>
</body>
</html>

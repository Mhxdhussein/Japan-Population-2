<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Population Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f5f7fa;
    --card: rgba(255,255,255,0.75);
    --text: #111;
    --sub: #666;
}

body.dark {
    --bg: #0f1115;
    --card: rgba(30,30,30,0.7);
    --text: #fff;
    --sub: #aaa;
}

body {
    margin: 0;
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s;
}

/* CONTAINER */
.container {
    width: 720px;
    padding: 30px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* TITLE */
.title {
    font-size: 22px;
    font-weight: 700;
}

/* FLAG */
.flag {
    width: 50px;
    height: 35px;
    background: white;
    border: 1px solid #ddd;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    animation: wave 2s infinite ease-in-out;
}

.flag::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: red;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

@keyframes wave {
    0%,100% { transform: rotate(0deg); }
    50% { transform: rotate(3deg); }
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

/* CARDS */
.card {
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

body.dark .card {
    background: rgba(40,40,40,0.7);
}

/* LABEL */
.label {
    font-size: 13px;
    color: var(--sub);
}

/* NUMBER */
.number {
    font-size: 34px;
    font-weight: 700;
}

.births { color: #2ecc71; }
.deaths { color: #e74c3c; }

/* BUTTONS */
.controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #111;
    color: white;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* CHART */
canvas {
    margin-top: 20px;
    width: 100%;
    height: 200px;
    background: rgba(255,255,255,0.4);
    border-radius: 12px;
}

body.dark canvas {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">Japan Population Dashboard</div>
        <div class="flag"></div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Births (Live)</div>
            <div class="number births" id="births">0</div>
        </div>

        <div class="card">
            <div class="label">Deaths (Live)</div>
            <div class="number deaths" id="deaths">0</div>
        </div>
    </div>

    <canvas id="chart"></canvas>

    <div class="controls">
        <button onclick="replay()">Replay</button>
        <button onclick="toggleDark()">Dark Mode</button>
    </div>

</div>

<script>
// SOUND
function beep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = 600;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
}

// COUNTERS
let birthsEl = document.getElementById("births");
let deathsEl = document.getElementById("deaths");

let births = 0;
let deaths = 0;

// LIVE UPDATE (real-time drift)
setInterval(() => {
    births += Math.floor(Math.random() * 3);
    deaths += Math.floor(Math.random() * 4);

    birthsEl.innerText = births.toLocaleString();
    deathsEl.innerText = deaths.toLocaleString();

    addToChart(deaths - births);
}, 1000);

// ANIMATION (replay)
function animateTo(targetB, targetD, duration = 7000) {
    let start = 0;
    let t0 = null;

    function step(t) {
        if (!t0) t0 = t;
        let p = (t - t0) / duration;

        if (p > 1) p = 1;

        births = Math.floor(p * targetB);
        deaths = Math.floor(p * targetD);

        birthsEl.innerText = births.toLocaleString();
        deathsEl.innerText = deaths.toLocaleString();

        if (p < 1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

// REPLAY
function replay() {
    beep();
    animateTo(800000, 1500000, 7000);
}

// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// START
replay();


// ================= GRAPH =================
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 700;
canvas.height = 200;

let data = [];

function addToChart(value) {
    data.push(value);
    if (data.length > 50) data.shift();
    drawChart();
}

function drawChart() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2);

    let step = canvas.width / data.length;

    data.forEach((v,i) => {
        let y = canvas.height/2 + v * 0.2;
        ctx.lineTo(i * step, y);
    });

    ctx.strokeStyle = "#2ecc71";
    ctx.lineWidth = 2;
    ctx.stroke();
}
</script>

</body>
</html>

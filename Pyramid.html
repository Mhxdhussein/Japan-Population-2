<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Population Pyramid (1990–2050)</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Noto Sans JP", sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 950px;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
.controls {
    display: flex;
    gap: 15px;
    align-items: center;
}
canvas {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Japan Population Pyramid (1990 → 2050)</h2>

    <div class="controls">
        <button onclick="togglePlay()">Play / Pause</button>
        <input type="range" min="1990" max="2050" value="1990" id="yearSlider">
        <span id="yearLabel">1990</span>
    </div>

    <canvas id="chart"></canvas>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 500;

const ages = [
"0-4","5-9","10-14","15-19","20-24","25-29","30-34","35-39","40-44",
"45-49","50-54","55-59","60-64","65-69","70-74","75-79","80-84","85-89","90-94","95+"
];

// base (1990 shape: wider bottom)
const base1990 = [
3.5,3.6,3.7,3.6,3.5,3.4,3.3,3.2,3.1,
3.0,2.8,2.5,2.2,1.8,1.4,1.0,0.7,0.4,0.2,0.1
];

// 2050 shape (aging top-heavy)
const base2050 = [
1.5,1.6,1.7,1.8,2.0,2.2,2.5,2.8,3.0,
3.2,3.4,3.6,3.8,4.0,4.2,4.0,3.5,3.0,2.0,1.2
];

let currentYear = 1990;
let playing = true;

const slider = document.getElementById("yearSlider");
const label = document.getElementById("yearLabel");

slider.oninput = () => {
    currentYear = parseInt(slider.value);
    label.innerText = currentYear;
    draw();
};

function interpolateData(year) {
    let t = (year - 1990) / (2050 - 1990);

    return base1990.map((v,i) => {
        return v + (base2050[i] - v) * t;
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let data = interpolateData(currentYear);

    const centerX = canvas.width/2;
    const barH = 20;

    for (let i=0;i<ages.length;i++){
        let y = i * barH + 20;
        let val = data[i] * 20;

        // male
        ctx.fillStyle = "#3b82f6";
        ctx.fillRect(centerX - val, y, val, 14);

        // female
        ctx.fillStyle = "#ec4899";
        ctx.fillRect(centerX, y, val, 14);

        // age labels
        ctx.fillStyle = "#333";
        ctx.font = "10px sans-serif";
        ctx.fillText(ages[i], centerX - 30, y+10);
    }

    // center line
    ctx.strokeStyle = "#aaa";
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, canvas.height);
    ctx.stroke();
}

function animate() {
    if (playing) {
        currentYear += 0.1;
        if (currentYear > 2050) currentYear = 1990;

        slider.value = currentYear;
        label.innerText = Math.floor(currentYear);
        draw();
    }

    requestAnimationFrame(animate);
}

function togglePlay() {
    playing = !playing;
}

draw();
animate();
</script>

</body>
</html>
